<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <span class="logo-icon">🌵</span>
      <h1>Raízes do Nordeste</h1>
    </a>
    <nav><a href="login.html">Entrar</a></nav>
  </header>

  <main>
    <h2>Criar conta</h2>
    <div class="card form-card">
      <form id="form-cadastro">
        <label>Nome completo</label>
        <input type="text" id="nome" required placeholder="Seu nome">

        <label>E-mail</label>
        <input type="email" id="email" required placeholder="seu@email.com">

        <label>Telefone</label>
        <input type="tel" id="telefone" placeholder="(48) 99999-9999">

        <label>Senha</label>
        <input type="password" id="senha" required minlength="4" placeholder="Mínimo 4 caracteres">

        <div class="lgpd-box">
          <label>
            <input type="checkbox" id="consentimento" required>
            <span>Li e aceito a <a href="privacidade.html" target="_blank">Política de Privacidade</a>. Autorizo o uso dos meus dados para pedidos, fidelidade e campanhas, conforme a LGPD.</span>
          </label>
        </div>

        <div class="lgpd-box">
          <label>
            <input type="checkbox" id="marketing">
            <span>Quero receber promoções por e-mail (opcional).</span>
          </label>
        </div>

        <div id="msg-cadastro"></div>
        <button type="submit" class="btn btn-block">Cadastrar</button>
      </form>
    </div>
  </main>

  <footer><a href="privacidade.html">Política de Privacidade</a></footer>

  <script src="js/app.js"></script>
  <script>
    document.getElementById("form-cadastro").addEventListener("submit", function(e) {
      e.preventDefault();
      const msg = document.getElementById("msg-cadastro");
      if (!document.getElementById("consentimento").checked) {
        mostrarMsg(msg, "É necessário aceitar a política de privacidade.", "erro");
        return;
      }
      const user = {
        nome: document.getElementById("nome").value.trim(),
        email: document.getElementById("email").value.trim(),
        telefone: document.getElementById("telefone").value.trim(),
        senha: document.getElementById("senha").value,
        pontos: 0,
        marketing: document.getElementById("marketing").checked,
        consentimentoData: new Date().toISOString()
      };
      salvarUsuario(user);
      mostrarMsg(msg, "Cadastro realizado com sucesso!", "ok");
      setTimeout(() => location.href = "login.html", 1000);
    });
  </script>
</body>
</html>
