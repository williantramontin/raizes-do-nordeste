<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <span class="logo-icon">🌵</span>
      <h1>Raízes do Nordeste</h1>
    </a>
    <nav><a href="index.html">Início</a></nav>
  </header>

  <main>
    <h2>Entrar na sua conta</h2>
    <div class="card form-card">
      <form id="form-login">
        <label>E-mail</label>
        <input type="email" id="email" required placeholder="seu@email.com">

        <label>Senha</label>
        <input type="password" id="senha" required minlength="4" placeholder="••••">

        <div id="msg-login"></div>
        <button type="submit" class="btn btn-block">Entrar</button>
      </form>
      <p style="margin-top:16px;font-size:0.9rem;text-align:center;">
        Não tem conta? <a href="cadastro.html" style="color:var(--laranja);font-weight:600;">Cadastre-se</a>
      </p>
    </div>
  </main>

  <footer><a href="privacidade.html">Política de Privacidade</a></footer>

  <script src="js/app.js"></script>
  <script>
    document.getElementById("form-login").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;
      const msg = document.getElementById("msg-login");
      const user = getUsuario();
      if (user && user.email === email && user.senha === senha) {
        mostrarMsg(msg, "Login realizado! Redirecionando...", "ok");
        setTimeout(() => location.href = "index.html", 800);
      } else {
        mostrarMsg(msg, "E-mail ou senha incorretos.", "erro");
      }
    });
  </script>
</body>
</html>
