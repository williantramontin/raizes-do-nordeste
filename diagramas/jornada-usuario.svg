<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 400" font-family="Arial, sans-serif" font-size="11">
  <rect width="950" height="400" fill="#fafafa"/>
  <text x="475" y="25" text-anchor="middle" font-size="15" font-weight="bold">Jornada do Usuário - Cliente (App/Web)</text>

  <!-- Timeline -->
  <line x1="50" y1="200" x2="900" y2="200" stroke="#ccc" stroke-width="3"/>

  <!-- Steps -->
  <g>
    <circle cx="80" cy="200" r="20" fill="#e8751a" stroke="#5c3d2e" stroke-width="2"/>
    <text x="80" y="205" text-anchor="middle" fill="white" font-weight="bold">1</text>
    <text x="80" y="240" text-anchor="middle">Acessa app</text>
    <text x="80" y="255" text-anchor="middle" fill="#666">Descobre marca</text>
    <rect x="30" y="130" width="100" height="40" fill="#fff3cd" stroke="#ccc" rx="4"/>
    <text x="80" y="155" text-anchor="middle">Emoçăo: curioso</text>
  </g>

  <g>
    <circle cx="200" cy="200" r="20" fill="#e8751a" stroke="#5c3d2e" stroke-width="2"/>
    <text x="200" y="205" text-anchor="middle" fill="white" font-weight="bold">2</text>
    <text x="200" y="240" text-anchor="middle">Escolhe unidade</text>
    <text x="200" y="255" text-anchor="middle" fill="#666">Cardápio local</text>
    <rect x="150" y="280" width="100" height="35" fill="#e8f4fd" stroke="#ccc" rx="4"/>
    <text x="200" y="302" text-anchor="middle">Sistema: filtra produtos</text>
  </g>

  <g>
    <circle cx="320" cy="200" r="20" fill="#e8751a" stroke="#5c3d2e" stroke-width="2"/>
    <text x="320" y="205" text-anchor="middle" fill="white" font-weight="bold">3</text>
    <text x="320" y="240" text-anchor="middle">Monta pedido</text>
    <text x="320" y="255" text-anchor="middle" fill="#666">Carrinho</text>
  </g>

  <g>
    <circle cx="440" cy="200" r="20" fill="#e8751a" stroke="#5c3d2e" stroke-width="2"/>
    <text x="440" y="205" text-anchor="middle" fill="white" font-weight="bold">4</text>
    <text x="440" y="240" text-anchor="middle">Login/Cadastro</text>
    <text x="440" y="255" text-anchor="middle" fill="#666">Consentimento LGPD</text>
    <rect x="390" y="130" width="100" height="40" fill="#cce5ff" stroke="#ccc" rx="4"/>
    <text x="440" y="148" text-anchor="middle">Decisăo: criar</text>
    <text x="440" y="162" text-anchor="middle">conta ou năo</text>
  </g>

  <g>
    <circle cx="560" cy="200" r="20" fill="#e8751a" stroke="#5c3d2e" stroke-width="2"/>
    <text x="560" y="205" text-anchor="middle" fill="white" font-weight="bold">5</text>
    <text x="560" y="240" text-anchor="middle">Pagamento</text>
    <text x="560" y="255" text-anchor="middle" fill="#666">Gateway externo</text>
    <rect x="510" y="280" width="100" height="45" fill="#d4edda" stroke="#ccc" rx="4"/>
    <text x="560" y="298" text-anchor="middle">Integraçăo:</text>
    <text x="560" y="312" text-anchor="middle">confirma/recusa</text>
  </g>

  <g>
    <circle cx="680" cy="200" r="20" fill="#e8751a" stroke="#5c3d2e" stroke-width="2"/>
    <text x="680" y="205" text-anchor="middle" fill="white" font-weight="bold">6</text>
    <text x="680" y="240" text-anchor="middle">Acompanha status</text>
    <text x="680" y="255" text-anchor="middle" fill="#666">Em preparo</text>
    <rect x="630" y="130" width="100" height="35" fill="#fff3cd" stroke="#ccc" rx="4"/>
    <text x="680" y="152" text-anchor="middle">Estado: aguardando</text>
  </g>

  <g>
    <circle cx="800" cy="200" r="20" fill="#2d6a4f" stroke="#5c3d2e" stroke-width="2"/>
    <text x="800" y="205" text-anchor="middle" fill="white" font-weight="bold">7</text>
    <text x="800" y="240" text-anchor="middle">Retira pedido</text>
    <text x="800" y="255" text-anchor="middle" fill="#666">Ganha pontos</text>
    <rect x="750" y="280" width="100" height="35" fill="#d4edda" stroke="#ccc" rx="4"/>
    <text x="800" y="302" text-anchor="middle">Fidelidade ativa</text>
  </g>

  <!-- Arrows between steps -->
  <polygon points="115,200 125,195 125,205" fill="#999"/>
  <polygon points="235,200 245,195 245,205" fill="#999"/>
  <polygon points="355,200 365,195 365,205" fill="#999"/>
  <polygon points="475,200 485,195 485,205" fill="#999"/>
  <polygon points="595,200 605,195 605,205" fill="#999"/>
  <polygon points="715,200 725,195 725,205" fill="#999"/>

  <text x="475" y="370" text-anchor="middle" fill="#666">Pontos de dor: fila na loja (totem/balcăo), falha no pagamento, produto indisponível na unidade</text>
  <text x="475" y="388" text-anchor="middle" fill="#666">Canais: App, Web e Totem compartilham a mesma lógica de cardápio e pedido</text>
</svg>
