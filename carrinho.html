<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <span class="logo-icon">🌵</span>
      <h1>Raízes do Nordeste</h1>
    </a>
    <nav><a href="cardapio.html">← Voltar ao cardápio</a></nav>
  </header>

  <main>
    <h2>🛒 Seu pedido</h2>
    <div id="lista-itens"></div>
    <div class="card">
      <div class="total-box">
        <p style="margin:0;"><strong>Total:</strong> <span id="total" class="pontos" style="font-size:1.3rem;">R$ 0,00</span></p>
      </div>
      <p style="font-size:0.85rem;color:#666;">📦 Retirada na unidade selecionada (pick-up)</p>
      <button id="btn-finalizar" class="btn btn-block">Finalizar pedido</button>
      <p id="msg-carrinho" class="msg-erro hidden"></p>
    </div>
  </main>

  <footer><a href="privacidade.html">Política de Privacidade</a></footer>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const lista = document.getElementById("lista-itens");
    const totalEl = document.getElementById("total");
    const msg = document.getElementById("msg-carrinho");

    function renderizar() {
      const carrinho = getCarrinho();
      lista.innerHTML = "";
      if (carrinho.length === 0) {
        lista.innerHTML = '<div class="card"><p>Carrinho vazio.</p><a href="index.html" class="btn btn-block">Escolher unidade</a></div>';
        document.getElementById("btn-finalizar").disabled = true;
        totalEl.textContent = "R$ 0,00";
        return;
      }
      carrinho.forEach((item, idx) => {
        const div = document.createElement("div");
        div.className = "card produto-card";
        div.innerHTML = `
          <span class="produto-icon">${item.icon || "🍽️"}</span>
          <div class="produto-info">
            <h4>${item.nome}</h4>
            <span>${formatPreco(item.preco * item.qtd)}</span>
          </div>
          <div class="carrinho-qtd">
            <button data-acao="menos" data-idx="${idx}">−</button>
            <span>${item.qtd}</span>
            <button data-acao="mais" data-idx="${idx}">+</button>
          </div>
        `;
        lista.appendChild(div);
      });
      totalEl.textContent = formatPreco(totalCarrinho());
      document.getElementById("btn-finalizar").disabled = false;
    }

    lista.addEventListener("click", function(e) {
      if (e.target.tagName !== "BUTTON") return;
      const idx = parseInt(e.target.dataset.idx);
      const carrinho = getCarrinho();
      if (e.target.dataset.acao === "mais") carrinho[idx].qtd++;
      else {
        carrinho[idx].qtd--;
        if (carrinho[idx].qtd <= 0) carrinho.splice(idx, 1);
      }
      salvarCarrinho(carrinho);
      renderizar();
    });

    document.getElementById("btn-finalizar").addEventListener("click", function() {
      if (getCarrinho().length === 0) {
        msg.textContent = "Adicione itens antes de finalizar.";
        msg.classList.remove("hidden");
        return;
      }
      criarPedido();
      location.href = "pagamento.html";
    });

    renderizar();
  </script>
</body>
</html>
